<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AssistIQ demo preview</title>
  <desc id="desc">A backend API demo preview showing authentication, ticket creation, citation-gated AI draft generation, and admin audit logs.</desc>
  <rect width="1280" height="720" rx="0" fill="#0F172A"/>
  <rect x="32" y="32" width="1216" height="656" rx="18" fill="#111827" stroke="#334155"/>

  <text x="72" y="84" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">AssistIQ - SaaS Support Copilot API</text>
  <text x="72" y="118" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="17">Portfolio backend: JWT/RBAC, EF Core/PostgreSQL, audit logs, usage tracking, citation-gated AI drafts.</text>

  <g transform="translate(72 152)">
    <rect width="182" height="34" rx="17" fill="#DCFCE7"/>
    <text x="18" y="23" fill="#14532D" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">CI: 32 tests passing</text>
  </g>
  <g transform="translate(270 152)">
    <rect width="172" height="34" rx="17" fill="#DBEAFE"/>
    <text x="18" y="23" fill="#1E3A8A" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Docker demo ready</text>
  </g>
  <g transform="translate(458 152)">
    <rect width="196" height="34" rx="17" fill="#FEF3C7"/>
    <text x="18" y="23" fill="#78350F" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">OpenAPI in dev mode</text>
  </g>

  <g transform="translate(72 220)">
    <rect width="352" height="390" rx="14" fill="#F8FAFC"/>
    <rect width="352" height="54" rx="14" fill="#2563EB"/>
    <text x="24" y="35" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">1. Auth + Ticket</text>
    <text x="24" y="88" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Support Agent logs in</text>
    <text x="24" y="119" fill="#475569" font-family="Consolas, monospace" font-size="15">POST /api/auth/login</text>
    <rect x="24" y="142" width="304" height="92" rx="10" fill="#E2E8F0"/>
    <text x="42" y="170" fill="#0F172A" font-family="Consolas, monospace" font-size="14">{</text>
    <text x="58" y="194" fill="#0F172A" font-family="Consolas, monospace" font-size="14">"email": "agent@assistiq.local",</text>
    <text x="58" y="218" fill="#0F172A" font-family="Consolas, monospace" font-size="14">"role": "SupportAgent"</text>
    <text x="42" y="242" fill="#0F172A" font-family="Consolas, monospace" font-size="14">}</text>
    <text x="24" y="278" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Creates customer ticket</text>
    <text x="24" y="309" fill="#475569" font-family="Consolas, monospace" font-size="15">POST /api/tickets</text>
    <rect x="24" y="330" width="304" height="40" rx="10" fill="#DBEAFE"/>
    <text x="42" y="356" fill="#1E3A8A" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Status: Open - owned by agent</text>
  </g>

  <path d="M446 415H492" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M492 415L480 403M492 415L480 427" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(514 220)">
    <rect width="352" height="390" rx="14" fill="#F8FAFC"/>
    <rect width="352" height="54" rx="14" fill="#059669"/>
    <text x="24" y="35" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">2. Citation-Gated Draft</text>
    <text x="24" y="88" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Generate draft from knowledge</text>
    <text x="24" y="119" fill="#475569" font-family="Consolas, monospace" font-size="15">POST /api/tickets/{id}/drafts/generate</text>
    <rect x="24" y="142" width="304" height="160" rx="10" fill="#E2E8F0"/>
    <text x="42" y="170" fill="#0F172A" font-family="Consolas, monospace" font-size="14">{</text>
    <text x="58" y="194" fill="#0F172A" font-family="Consolas, monospace" font-size="14">"status": "Generated",</text>
    <text x="58" y="218" fill="#0F172A" font-family="Consolas, monospace" font-size="14">"source": "AiGenerated",</text>
    <text x="58" y="242" fill="#0F172A" font-family="Consolas, monospace" font-size="14">"citations": [</text>
    <text x="74" y="266" fill="#0F172A" font-family="Consolas, monospace" font-size="14">"billing.md", "confidence": 0.91</text>
    <text x="58" y="290" fill="#0F172A" font-family="Consolas, monospace" font-size="14">]</text>
    <text x="42" y="314" fill="#0F172A" font-family="Consolas, monospace" font-size="14">}</text>
    <rect x="24" y="330" width="304" height="40" rx="10" fill="#DCFCE7"/>
    <text x="42" y="356" fill="#14532D" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Send allowed only with citations</text>
  </g>

  <path d="M888 415H934" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M934 415L922 403M934 415L922 427" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(956 220)">
    <rect width="252" height="390" rx="14" fill="#F8FAFC"/>
    <rect width="252" height="54" rx="14" fill="#7C3AED"/>
    <text x="24" y="35" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">3. Admin Evidence</text>
    <text x="24" y="88" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Audit log</text>
    <text x="24" y="119" fill="#475569" font-family="Consolas, monospace" font-size="15">GET /api/audit-logs</text>
    <rect x="24" y="142" width="204" height="82" rx="10" fill="#F3E8FF"/>
    <text x="42" y="174" fill="#581C87" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">DraftGenerated</text>
    <text x="42" y="201" fill="#581C87" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">DraftSent</text>
    <text x="24" y="264" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Usage log</text>
    <text x="24" y="295" fill="#475569" font-family="Consolas, monospace" font-size="15">GET /api/usage-logs</text>
    <rect x="24" y="318" width="204" height="52" rx="10" fill="#FEF3C7"/>
    <text x="42" y="351" fill="#78350F" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">tokens + estimated cost</text>
  </g>

  <text x="72" y="654" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="15">Demo flow: login - create ticket - generate cited draft - send - inspect audit and usage logs.</text>
</svg>
